name: Release Admin App

on:
  push:
    tags:
      - 'admin-v*'  # Trigger saat push tag seperti: admin-v1.0.1

jobs:
  build-admin:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Build & Package Admin (includes server)
        working-directory: admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build -- --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-installer
          path: |
            admin/dist-electron/*.exe
            admin/dist-electron/*.yml
            admin/dist-electron/*.yaml
