name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
            admin/package-lock.json
      - name: Install dependencies
        run: |
          npm ci --prefix server
          npm ci --prefix client
          npm ci --prefix admin
      - name: Check backend syntax
        run: find server/src server/scripts -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Test backend
        run: npm test --prefix server
      - name: Test client contracts
        run: npm test --prefix client
      - name: Test admin media contract
        run: npm test --prefix admin
      - name: Build client
        run: npm run build:react --prefix client
      - name: Build admin
        run: npm run build:react --prefix admin
      - name: Audit dependencies
        run: |
          npm audit --audit-level=high --prefix server
          npm audit --audit-level=high --prefix client
          npm audit --audit-level=high --prefix admin

  dotnet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build .NET rewrite
        run: dotnet build LabKom.NET/LabKom.sln --configuration Release
      - name: Test .NET rewrite
        run: dotnet test LabKom.NET/LabKom.sln --configuration Release --no-build --no-restore
      - name: Runtime health checks
        shell: pwsh
        run: |
          $health = Join-Path $env:RUNNER_TEMP "labkom-health"
          New-Item -ItemType Directory -Path $health -Force | Out-Null
          $env:LABKOM_SHARED_SECRET = "CI-health-check-only-0123456789-ABCDEFGHIJKLMNOPQRSTUVWXYZ"
          $env:Security__ClassroomId = [Guid]::NewGuid().ToString("N")
          $env:Security__AuditPath = Join-Path $health "audit.jsonl"
          $env:Security__TlsPinPath = Join-Path $health "tls-pin.txt"
          $env:Telemetry__OutputDirectory = Join-Path $health "telemetry"
          $env:Database__ConnectionString = "Data Source=" + (Join-Path $health "labkom.db")
          $env:Teacher__HubPort = "42135"
          dotnet "LabKom.NET/src/LabKom.Teacher/bin/Release/net8.0-windows/LabKom.Teacher.dll" --health-check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet "LabKom.NET/src/LabKom.Student/bin/Release/net8.0-windows/LabKom.Student.Agent.dll" --health-check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Remove-Item Env:\LABKOM_SHARED_SECRET -ErrorAction SilentlyContinue

      - name: Verify .NET formatting
        run: dotnet format LabKom.NET/LabKom.sln --no-restore --verify-no-changes
