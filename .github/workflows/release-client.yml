name: Release Client App

on:
  push:
    tags:
      - 'client-v*'  # Trigger saat push tag seperti: client-v1.0.1

jobs:
  build-client:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build & Package Client
        working-directory: client
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build -- --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-installer
          path: |
            client/dist-electron/*.exe
            client/dist-electron/*.yml
            client/dist-electron/*.yaml
