name: Release LabKom Native

on:
  push:
    tags:
      - "native-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (for example 0.5.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: LabKom.NET/**/*.csproj

      - name: Resolve release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".Replace("native-v", "")
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid semantic version: $version"
          }
          "LABKOM_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore, build, and test
        shell: pwsh
        working-directory: LabKom.NET
        run: |
          dotnet restore LabKom.sln
          dotnet build LabKom.sln --configuration Release --no-restore
          dotnet test tests/LabKom.Tests/LabKom.Tests.csproj --configuration Release --no-build --no-restore

      - name: Materialize signing certificate
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.LABKOM_SIGNING_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_BASE64)) {
            throw "GitHub secret LABKOM_SIGNING_PFX_BASE64 is missing."
          }
          $bytes = [Convert]::FromBase64String($env:SIGNING_PFX_BASE64)
          $path = Join-Path $env:RUNNER_TEMP "LabKom-CodeSigning.pfx"
          [IO.File]::WriteAllBytes($path, $bytes)
          "LABKOM_SIGNING_PFX=$path" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build signed installers and update packages
        shell: pwsh
        working-directory: LabKom.NET
        env:
          LABKOM_SIGNING_PASSWORD: ${{ secrets.LABKOM_SIGNING_PFX_PASSWORD }}
        run: |
          ./scripts/build-release.ps1 -Version $env:LABKOM_RELEASE_VERSION -PfxPath $env:LABKOM_SIGNING_PFX -Repository "${{ github.repository }}"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "native-v$env:LABKOM_RELEASE_VERSION"
          $assets = (Get-ChildItem "LabKom.NET/artifacts/release" -File).FullName
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --title "LabKom Native $env:LABKOM_RELEASE_VERSION" --generate-notes --latest
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publication failed."
          }

      - name: Remove signing material
        if: always()
        shell: pwsh
        run: |
          if ($env:LABKOM_SIGNING_PFX -and (Test-Path -LiteralPath $env:LABKOM_SIGNING_PFX)) {
            Remove-Item -LiteralPath $env:LABKOM_SIGNING_PFX -Force
          }
